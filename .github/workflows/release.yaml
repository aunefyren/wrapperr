name: Release GO binaries

on:
  release:
    types: [published]

jobs:
  releases-matrix:
    name: Release Go Binary
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # build and publish in parallel: linux/{386,amd64,arm64,arm}, windows/{386,amd64}
        goos: [linux, windows]
        goarch: ["386", amd64, arm64, arm]
        # Windows builds are only shipped for x86; arm/arm64 are linux-only.
        exclude:
          - goos: windows
            goarch: arm64
          - goos: windows
            goarch: arm
    steps:
    - uses: actions/checkout@v4
    - uses: wangyoucao577/go-release-action@v1.53
      with:
        github_token: ${{ secrets.GIT_HUB_TOKEN }}
        goos: ${{ matrix.goos }}
        goarch: ${{ matrix.goarch }}
        goversion: "1.25.0"
        binary_name: "wrapperr"
        ldflags: "-s -w"
        extra_files: README.md config web CODE_OF_CONDUCT.md Dockerfile files
        retry: 10
        overwrite: true
        release_name: ${{ github.ref_name }}
        pre_command: sed -i 's/{{RELEASE_TAG}}/${{ github.event.release.tag_name }}/g' files/config.go # Replace release variable with the name of this release